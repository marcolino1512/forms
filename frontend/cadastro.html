<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <title>Cadastro</title>
</head>
<body>
    <div class="container">
        <div class="login__content">
            <img src="Img/Fundo.jpg" alt="Fundo-imagem" class="login__img">
            <form action="" class="login__form" id="cadastro-form" novalidate>
                <div>
                    <h1 class="login__title"><span>Crie sua conta</span></h1>
                    <p class="login__descricao">Preencha os dados para se cadastrar</p>
                </div>

                <p class="login__error" id="cadastro-error"></p>
                <p class="login__success" id="cadastro-success"></p>

                <div>
                    <div class="login__inputs">
                        <div>
                            <label for="input-nome" class="login__label">Nome</label>
                            <input type="text" placeholder="Entre com seu nome" required class="login__input" id="input-nome" name="nome" minlength="2">
                        </div>
                        <div>
                            <label for="input-email" class="login__label">Email</label>
                            <input type="email" placeholder="Entre com seu email" required class="login__input" id="input-email" name="email">
                        </div>
                        <div>
                            <label for="input-pass" class="login__label">Senha</label>
                            <div class="login__box">
                                <input type="password" placeholder="Crie uma senha" required class="login__input" id="input-pass" name="senha" minlength="6">
                                <i class="ri-eye-off-line login__eye" id="input-icon"></i>
                            </div>
                        </div>
                        <div>
                            <label for="input-pass-confirm" class="login__label">Repetir senha</label>
                            <div class="login__box">
                                <input type="password" placeholder="Repita a senha" required class="login__input" id="input-pass-confirm" name="confirmarSenha" minlength="6">
                                <i class="ri-eye-off-line login__eye" id="input-icon-confirm"></i>
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="login__buttons">
                            <button class="login__button" type="submit" id="cadastro-submit">Cadastrar</button>
                        </div>
                        <p class="login__switch">Já tem uma conta? <a href="index.html">Fazer login</a></p>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="ui.js"></script>
    <script src="cadastro.js"></script>
</body>
</html>
